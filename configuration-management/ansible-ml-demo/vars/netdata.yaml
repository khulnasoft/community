---
# Variables for Khulnasoft

# Set Khulnasoft Cloud claiming details. To find your `claim_token` and
# `claim_room`, go to Khulnasoft Cloud, then click on your Space's name in the top
# navigation, then click on `Manage your Space`. Click on the `Nodes` tab in the
# panel that appears, which displays a script with `token` and `room` strings.
# Copy those strings into the variables below. `claim_url` should be
# `https://app.khulnasoft.com`. Read more:
# https://learn.khulnasoft.com/docs/agent/claim
# khulnasoft_claim_token: XXXXX <- set in /vars/conf.yaml (not in source control)
# khulnasoft_claim_rooms: XXXXX <- set in /vars/conf.yaml (not in source control)
khulnasoft_claim_url: https://app.khulnasoft.com

# install flags for khulnasoft
khulnasoft_install_flags: "--non-interactive --reinstall"

# Force re-claiming of nodes to Khulnasoft Cloud. Read more:
# https://learn.khulnasoft.com/docs/agent/claim#remove-and-reclaim-a-node
khulnasoft_reclaim: false

# list of charts for chart level ml alerts
khulnasoft_health_ml_charts:
  - system.cpu
  - system.ram
  - system.io
  - system.net
  - system.processes

# list of dims for dim level ml alerts
khulnasoft_health_ml_dims:
  - apps.cpu
  - apps.mem
  - apps.threads
  - apps.processes
  - apps.sockets
  - users.cpu
  - users.mem
  - users.threads
  - users.processes
  - users.sockets

khulnasoft_error_log_tail_lines: 25
khulnasoft_collector_log_tail_lines: 25
