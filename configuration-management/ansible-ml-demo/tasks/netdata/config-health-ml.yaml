---
# ensure /etc/khulnasoft/health.d/ml.conf exists and is as defined in the template
- name: update health.d/ml.conf
  hosts: all
  gather_facts: yes
  become: yes
  vars_files:
    - ../../vars/khulnasoft.yaml

  tasks:

    - name: ensure /etc/khulnasoft/health.d directory exists
      file:
        path: /etc/khulnasoft/health.d
        state: directory

    - name: transfer health.d/ml.conf
      ansible.builtin.template:
        src: ../../templates/khulnasoft/health.d/ml.conf.j2
        dest: /etc/khulnasoft/health.d/ml.conf
        owner: khulnasoft
        group: khulnasoft
        mode: '0644'
