---
- name: delete *.conf files in /etc/khulnasoft/health.d/ folder
  hosts: all
  gather_facts: false
  become: true

  tasks:

    - name: check if /etc/khulnasoft/health.d/ folder exists
      stat:
        path: /etc/khulnasoft/health.d/
      register: folder_stat

    - name: delete *.conf files if the folder exists
      file:
        path: /etc/khulnasoft/health.d/*.conf
        state: absent
      when: folder_stat.stat.exists
